<!DOCTYPE html>
<html>
<head>
    <title>Halls</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .navbar {
            background: #2c3e50;
            padding: 15px;
            display: flex;
            justify-content: space-around;
        }

        .navbar a {
            color: white;
            text-decoration: none;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 15px;
            background: #1abc9c;
            color: white;
            border: none;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #eee;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/dashboard">Dashboard</a>
    <a href="/students">Students</a>
    <a href="/halls">Halls</a>
    <a href="/faculty">Faculty</a>
    <a href="/seating">Seating</a>
    <a href="/reports">Reports</a>
</div>

<div class="container">

    <!-- MANUAL ADD -->
    <div class="card">
        <h2>Add Hall (Manual)</h2>
        <form method="POST" action="/add_hall">
            <input type="text" name="name" placeholder="Hall Name" required>
            <input type="number" name="rows" placeholder="Rows" required>
            <input type="number" name="columns" placeholder="Columns" required>
            <button type="submit">Add Hall</button>
        </form>
    </div>

    <!-- CSV UPLOAD -->
    <div class="card">
        <h2>Upload Halls CSV</h2>
        <form method="POST" action="/upload_halls_csv" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Upload CSV</button>
        </form>
    </div>

    <!-- HALL LIST -->
    <div class="card">
        <h2>Hall List</h2>

        <table>
            <tr>
                <th>Hall</th>
                <th>Rows</th>
                <th>Columns</th>
                <th>Capacity</th>
            </tr>

            {% for h in halls %}
            <tr>
                <td>{{ h.name }}</td>
                <td>{{ h.rows }}</td>
                <td>{{ h.columns }}</td>
                <td>{{ h.rows * h.columns * 2 }}</td>
            </tr>
            {% endfor %}

        </table>
    </div>

</div>

</body>
</html>
