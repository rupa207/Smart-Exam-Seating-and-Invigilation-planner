<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        /* NAVBAR */
        .navbar {
            background: #2c3e50;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-around;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #1abc9c;
        }

        /* CONTAINER */
        .container {
            width: 90%;
            margin: auto;
            margin-top: 20px;
        }

        h2 {
            color: #2c3e50;
        }

        /* CARD STYLE */
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        /* INPUTS */
        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 8px 15px;
            background: #1abc9c;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #16a085;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .delete-btn {
            background: red;
        }

        .delete-btn:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/dashboard">Dashboard</a>
    <a href="/students">Students</a>
    <a href="/halls">Halls</a>
    <a href="/faculty">Faculty</a>
    <a href="/seating">Seating</a>
    <a href="/reports">Reports</a>
</div>

<div class="container">

    <!-- ADD STUDENT -->
    <div class="card">
        <h2>Add Student</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="Name" required>
            <input type="text" name="roll_number" placeholder="Roll Number" required>
            <input type="text" name="branch" placeholder="Branch" required>
            <input type="text" name="year" placeholder="Year" required>
            <br>
            <button type="submit">Add Student</button>
        </form>
    </div>

    <!-- CSV UPLOAD -->
    <div class="card">
        <h2>Upload CSV</h2>
        <form method="POST" action="/upload_csv" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Upload</button>
        </form>
    </div>

    <!-- STUDENT LIST -->
    <div class="card">
        <h2>Student List</h2>

        <table>
            <tr>
                <th>Name</th>
                <th>Roll Number</th>
                <th>Branch</th>
                <th>Year</th>
                <th>Action</th>
            </tr>

            {% for s in students %}
            <tr>
                <td>{{ s.name }}</td>
                <td>{{ s.roll_number }}</td>
                <td>{{ s.branch }}</td>
                <td>{{ s.year }}</td>
                <td>
                    <a href="/delete_student/{{ s.id }}">
                        <button class="delete-btn">Delete</button>
                    </a>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

</div>

</body>
</html>
